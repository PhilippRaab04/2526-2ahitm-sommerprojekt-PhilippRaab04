<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Dungeon - Entrance</title>
    <link rel="stylesheet" href="../style/entrancestyle.css">
</head>

<body>
    <main class="entrance-page">
        <section class="overlay-content">
            <h1 class="main-title">Welcome to the quiz dungeon</h1>

            <p class="intro-text">
                Enter If you dare. In the Quiz Dungeon, every question is a challenge
                and every answer decides your fate.
                <br>
                Do you have the knowledge to survive the darkness...
                <br>
                or will the dungeon defeat you?
            </p>

            <div class="top-buttons">
                <a href="./game.html" class="menu-button large-button">Start Game</a>
                <button class="menu-button large-button" type="button">Settings</button>
            </div>

            <div class="bottom-buttons">
                <button class="menu-button small-button" type="button">Tutorial</button>
                <button class="menu-button small-button" type="button">Leaderboard</button>
            </div>
        </section>
    </main>
</body>

</html>
